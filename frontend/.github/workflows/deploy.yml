name: 🚀 Deploy to Droplet

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📡 Connect to Droplet and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          timeout: 40m
          script: |
            set -e
            echo "📥 Pulling latest code from all repositories..."
            cd /home/carusel/my-app/proiect-licenta && git pull origin main
            BACKEND_CHANGED=$(git diff --name-only HEAD@{1} HEAD | wc -l)
            
            cd /home/carusel/my-app/proiect-licenta-backend && git pull origin main
            FRONTEND_CHANGED=$(git diff --name-only HEAD@{1} HEAD | wc -l)
            
            cd /home/carusel/my-app/proiect-licenta-fastapi && git pull origin main
            FASTAPI_CHANGED=$(git diff --name-only HEAD@{1} HEAD | wc -l)
            
            cd /home/carusel/my-app/licenta-infrastructura && git pull origin main
            echo "🧼 Stopping old containers..."
            docker compose down
            echo "🧹 (Optional) Cleaning up unused Docker data..."
            docker system prune -af
            echo "🐳 Rebuilding containers"
            if [ "$BACKEND_CHANGED" -gt 0 ]; then
              echo "📦 Backend changed – rebuilding..."
              docker compose build backend
            fi
            
            if [ "$FASTAPI_CHANGED" -gt 0 ]; then
              echo "📦 FastAPI changed – rebuilding..."
              docker compose build fastapi
            fi
            
            if [ "$FRONTEND_CHANGED" -gt 0 ]; then
              echo "📦 Frontend changed – rebuilding..."
              docker compose build frontend
            fi
            echo "🚀 Starting containers..."
            docker compose up -d
            echo "✅ Deployment complete!"
