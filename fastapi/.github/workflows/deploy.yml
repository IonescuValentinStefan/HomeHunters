name: 🚀 Deploy to Droplet

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📡 Connect to Droplet and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          timeout: 40m
          script: |
            set -e
            echo "📥 Fetching and resetting code from all repositories..."
            
            cd /home/carusel/my-app/proiect-licenta
            git fetch origin
            git reset --hard origin/main
            BACKEND_CHANGED=$(git diff --name-only HEAD@{1} HEAD | wc -l)

            cd /home/carusel/my-app/proiect-licenta-backend
            git fetch origin
            git reset --hard origin/main
            FRONTEND_CHANGED=$(git diff --name-only HEAD@{1} HEAD | wc -l)

            cd /home/carusel/my-app/proiect-licenta-fastapi
            git fetch origin
            git reset --hard origin/main
            FASTAPI_CHANGED=$(git diff --name-only HEAD@{1} HEAD | wc -l)

            cd /home/carusel/my-app/licenta-infrastructura
            git fetch origin
            git reset --hard origin/main

            echo "🧼 Stopping old containers..."
            docker compose down

            echo "🧹 (Optional) Cleaning up unused Docker data..."
            docker system prune -af

            echo "🐳 Rebuilding containers"
            if [ "$BACKEND_CHANGED" -gt 0 ]; then
              echo "📦 Backend changed – rebuilding..."
              docker compose build backend
            fi

            if [ "$FASTAPI_CHANGED" -gt 0 ]; then
              echo "📦 FastAPI changed – rebuilding..."
              docker compose build fastapi
            fi

            if [ "$FRONTEND_CHANGED" -gt 0 ]; then
              echo "📦 Frontend changed – rebuilding..."
              docker compose build frontend
            fi

            echo "🚀 Starting containers..."
            docker compose up -d
            echo "✅ Deployment complete!"
